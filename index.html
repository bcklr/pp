<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCKLR | Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="editorial-nav">
        <div class="logo-wrap">
            <img src="logo.png" alt="BCKLR Logo" class="chrome-logo">
        </div>
        <div class="tagline">GFX & SOFTWARE ENGINEERING</div>
    </nav>

    <main class="gallery">
        <div class="display-grid">
            <div class="display-box"><div class="box-inner"><span class="box-label">PROJECT_01</span></div></div>
            <div class="display-box"><div class="box-inner"><span class="box-label">PROJECT_02</span></div></div>
            <div class="display-box"><div class="box-inner"><span class="box-label">PROJECT_03</span></div></div>
            <div class="display-box"><div class="box-inner"><span class="box-label">PROJECT_04</span></div></div>
        </div>
    </main>

    <script>
    const logo = document.querySelector('.chrome-logo');

    // We listen to the whole window now so it's more responsive
    window.addEventListener('mousemove', (e) => {
        let box = logo.getBoundingClientRect();
        
        // Find the center of the logo
        let logoCenterX = box.left + box.width / 2;
        let logoCenterY = box.top + box.height / 2;

        // Calculate distance from mouse to center
        // Increasing the divisor (20) makes the tilt "heavier/slower"
        // Decreasing it (5) makes it "wilder"
        let rotateX = (logoCenterY - e.clientY) / 15; 
        let rotateY = (e.clientX - logoCenterX) / 15;

        // The transform: 
        // We add a slight scale so it pops out at you while it tilts
        logo.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
    });

    // Optional: Reset when the mouse is at the very bottom
    window.addEventListener('mouseout', (e) => {
        if (!e.relatedTarget) {
            logo.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
        }
    });
</script>
</body>
</html>
